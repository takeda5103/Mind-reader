<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goto special mind reader</title>
    
<style>
    body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
        color: #333;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        font-size: 2.5rem;
    }

    .instructions {
        background: rgba(255,255,255,0.7);
        padding: 15px;
        border-radius: 15px;
        max-width: 700px;
        margin: auto;
        line-height: 1.8;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .grid {
    margin: 30px auto;
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    gap: 8px;
    max-width: 1200px;
}

    .cell {
        background: rgba(255,255,255,0.7);
        padding: 12px;
        border-radius: 12px;
        transition: transform 0.2s;
        font-size: 1.2rem;
    }

    .cell:hover {
        transform: scale(1.08);
    }

    button {
        margin: 10px;
        padding: 12px 24px;
        border: none;
        border-radius: 15px;
        font-size: 16px;
        cursor: pointer;
        background: #ff69b4;
        color: white;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    button:hover {
        opacity: 0.85;
    }

    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(255,255,255,0.95);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
    }

    .spinner {
        width: 80px;
        height: 80px;
        border: 8px solid #ffd1dc;
        border-top: 8px solid #ff69b4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    #thinkingText {
        font-size: 2rem;
        margin-bottom: 20px;
    }

    #result {
        font-size: 8rem; /* ← 超大きく！ */
        margin-top: 20px;
        animation: pop 0.5s ease;
    }

    @keyframes pop {
        0% {
            transform: scale(0);
        }
        100% {
            transform: scale(1);
        }
    }

</style>
</head>

<body>

<h1>✨ 後藤's Special Mind Reader ✨</h1>

<div class="instructions">
    <p>
        1. 2桁の数字を思い浮かべてください<br>
        2. 各位の数を足してください<br>
        3. 元の数字から引いてください<br>
        4. 出てきた数字のマークを覚えてください<br>
        5. マークを強く念じながら心を読むをタップしてください
    </p>
</div>

<div class="grid" id="grid"></div>

<button onclick="generateGrid()">🌈 シャッフル</button>
<button onclick="readMind()">🔮 心を読む</button>

<div id="overlay">
    <div class="spinner"></div>
    <div id="thinkingText">集中してください…</div>
    <div id="result"></div>
</div>

<script>

const symbols = [
    "🐶","🐱","🐰","🦊","🐻","🐼","🐸","🐷", "🦄","🐥",
    "🐹","🐨","🦁","🐯","🐙","🦋","🌸","🌼","🍓","🍒",
    "🍩","🧁","🍀","⭐","🌈","💖","🎀","✨","☁️","🍭"
    
];

let winningSymbol = "";

function randomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function generateGrid() {

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    winningSymbol = randomSymbol();

    for (let i = 0; i < 100; i++) {

        let symbol;

        // 0だけ別
        if (i === 0) {

            do {
                symbol = randomSymbol();
            } while (symbol === winningSymbol);

        }

        // 9の倍数
        else if (i % 9 === 0) {

            symbol = winningSymbol;

        }

        // その他
        else {

            symbol = randomSymbol();

        }

        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = `${i} : ${symbol}`;

        grid.appendChild(cell);
    }
}

function readMind() {

    const overlay = document.getElementById("overlay");
    const result = document.getElementById("result");
    const thinkingText = document.getElementById("thinkingText");

    overlay.style.display = "flex";
    result.textContent = "";

    const messages = [
        "集中してください… ✨",
        "あなたの思考を読み取っています… 🧠",
        "思考をスキャン中… 🔍",
        "マークを発見しました… 🌈"
    ];

    let index = 0;

    thinkingText.textContent = messages[0];

    const interval = setInterval(() => {

        index++;

        if (index < messages.length) {
            thinkingText.textContent = messages[index];
        }

    }, 1000);

    setTimeout(() => {

        clearInterval(interval);

        thinkingText.textContent = "あなたの覚えたマークは…";

        result.textContent = winningSymbol;

    }, 4500);

    overlay.onclick = () => {
        overlay.style.display = "none";
    };
}

generateGrid();

</script>

</body>
</html>
